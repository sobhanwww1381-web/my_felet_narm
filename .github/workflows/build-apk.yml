name: ساخت خودکار APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: دریافت کد
      uses: actions/checkout@v4

    - name: نصب پایتون
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: نصب وابستگی‌ها
      run: |
        python -m pip install --upgrade pip
        pip install flet
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

    - name: نصب ابزار بسته‌بندی
      run: pip install flet-app-builder

    - name: ساخت APK
      run: flet build apk

    - name: آپلود خروجی
      uses: actions/upload-artifact@v4
      with:
        name: فایل-نهایی-اپ
        path: build/apk/release/app-release.apk
